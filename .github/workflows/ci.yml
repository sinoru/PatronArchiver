name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'generic/platform=macOS'
            test-destinations: >-
              -destination 'platform=macOS'
          - platform: iOS
            build-destination: 'generic/platform=iOS Simulator'
            test-destinations: >-
              -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
              -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max'
              -destination 'platform=iOS Simulator,name=iPhone 17'
              -destination 'platform=iOS Simulator,name=iPhone Air'
              -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
              -destination 'platform=iOS Simulator,name=iPad Air 11-inch (M3)'
              -destination 'platform=iOS Simulator,name=iPad (A16)'
              -destination 'platform=iOS Simulator,name=iPad mini (A17 Pro)'
    steps:
      - uses: actions/checkout@v5

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          # Download displaymode v1.4.0
          curl -fsSL https://github.com/p00ya/displaymode/releases/download/v1.4.0/displaymode -o /tmp/displaymode
          chmod +x /tmp/displaymode

          # List available display modes for diagnostics
          /tmp/displaymode d || true

          # Set resolution via displaymode (CoreGraphics API)
          if /tmp/displaymode t 1920 1080; then
            echo "Resolution set via displaymode"
          else
            echo "::warning::Failed to set resolution"
          fi

          sleep 2
          /tmp/displaymode d || true

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: >
          xcodebuild test-without-building
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          ${{ matrix.test-destinations }}
          -disable-concurrent-destination-testing
          -resultBundlePath '${{ runner.temp }}/TestResults.xcresult'
          CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: TestResults-${{ matrix.platform }}.xcresult
          path: ${{ runner.temp }}/TestResults.xcresult
