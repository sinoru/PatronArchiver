name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'generic/platform=macOS'
          - platform: iOS
            build-destination: 'generic/platform=iOS Simulator'
    steps:
      - uses: actions/checkout@v5

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          CODE_SIGNING_ALLOWED=NO

      - name: Archive Test Products
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          '${{ runner.temp }}/PatronArchiver.xctestproducts'
          '${{ runner.temp }}/PatronArchiver.xctestproducts.zip'

      - name: Upload Test Products
        uses: actions/upload-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}/PatronArchiver.xctestproducts.zip

  test:
    name: Test (${{ matrix.destination-name }})
    needs: build
    runs-on: ${{ matrix.runs-on || 'macos-latest' }}
    strategy:
      matrix:
        include:
          # macOS 26
          - platform: macOS
            destination-name: macOS 26 - Mac
            test-destination: 'platform=macOS'
            runs-on: macos-26
          # iOS 26 (2025 devices)
          - platform: iOS
            destination-name: iOS 26 - iPhone 17 Pro Max
            test-destination: 'platform=iOS Simulator,name=iPhone 17 Pro Max'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPhone 17
            test-destination: 'platform=iOS Simulator,name=iPhone 17'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPhone Air
            test-destination: 'platform=iOS Simulator,name=iPhone Air'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad Pro 13-inch (M5)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad Air 11-inch (M3)
            test-destination: 'platform=iOS Simulator,name=iPad Air 11-inch (M3)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad (A16)
            test-destination: 'platform=iOS Simulator,name=iPad (A16)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad mini (A17 Pro)
            test-destination: 'platform=iOS Simulator,name=iPad mini (A17 Pro)'
            runs-on: macos-26
          # macOS 15
          - platform: macOS
            destination-name: macOS 15 - Mac
            test-destination: 'platform=macOS'
            runs-on: macos-15
          # iOS 18 (2024 devices)
          - platform: iOS
            destination-name: iOS 18 - iPhone 16 Pro Max
            test-destination: 'platform=iOS Simulator,name=iPhone 16 Pro Max,OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPhone 16
            test-destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPhone 16e
            test-destination: 'platform=iOS Simulator,name=iPhone 16e,OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPad Pro 13-inch (M4)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPad Air 11-inch (M2)
            test-destination: 'platform=iOS Simulator,name=iPad Air 11-inch (M2),OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPad (10th generation)
            test-destination: 'platform=iOS Simulator,name=iPad (10th generation),OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iOS 18 - iPad mini (A17 Pro)
            test-destination: 'platform=iOS Simulator,name=iPad mini (A17 Pro),OS=18.5'
            runs-on: macos-15
          # macOS 14
          - platform: macOS
            destination-name: macOS 14 - Mac
            test-destination: 'platform=macOS'
            runs-on: macos-14
          # iOS 17 (2023 devices)
          - platform: iOS
            destination-name: iOS 17 - iPhone 15 Pro Max
            test-destination: 'platform=iOS Simulator,name=iPhone 15 Pro Max,OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPhone 15
            test-destination: 'platform=iOS Simulator,name=iPhone 15,OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPhone SE (3rd generation)
            test-destination: 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPad Pro 12.9-inch (6th generation)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 12.9-inch (6th generation),OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPad Air (5th generation)
            test-destination: 'platform=iOS Simulator,name=iPad Air (5th generation),OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPad (10th generation)
            test-destination: 'platform=iOS Simulator,name=iPad (10th generation),OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iOS 17 - iPad mini (6th generation)
            test-destination: 'platform=iOS Simulator,name=iPad mini (6th generation),OS=17.5'
            runs-on: macos-14
    steps:
      - name: Download Test Products
        uses: actions/download-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}

      - name: Extract Test Products
        run: ditto -x -k '${{ runner.temp }}/PatronArchiver.xctestproducts.zip' '${{ runner.temp }}'

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          # Download displaymode v1.4.0
          curl -fsSL https://github.com/p00ya/displaymode/releases/download/v1.4.0/displaymode -o /tmp/displaymode
          chmod +x /tmp/displaymode

          # List available display modes for diagnostics
          /tmp/displaymode d || true

          # Set resolution via displaymode (CoreGraphics API)
          if /tmp/displaymode t 1920 1080; then
            echo "Resolution set via displaymode"
          else
            echo "::warning::Failed to set resolution"
          fi

          sleep 2
          /tmp/displaymode d || true

      - name: Test
        run: >
          xcodebuild test-without-building
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          -destination '${{ matrix.test-destination }}'
          -resultBundlePath '${{ runner.temp }}/PatronArchiver.xcresult'

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: PatronArchiver-${{ matrix.destination-name }}.xcresult
          path: ${{ runner.temp }}/PatronArchiver.xcresult
