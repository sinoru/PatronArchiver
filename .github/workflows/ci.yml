name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'generic/platform=macOS'
          - platform: iOS
            build-destination: 'generic/platform=iOS Simulator'
    steps:
      - uses: actions/checkout@v5

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          -testProductsPath '${{ runner.temp }}/Products.xctestproducts'
          CODE_SIGNING_ALLOWED=NO

      - name: Archive Test Products
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          '${{ runner.temp }}/Products.xctestproducts'
          '${{ runner.temp }}/Products.xctestproducts.zip'

      - name: Upload Test Products
        uses: actions/upload-artifact@v7
        with:
          name: TestProducts-${{ matrix.platform }}
          path: ${{ runner.temp }}/Products.xctestproducts.zip

  test:
    name: Test (${{ matrix.destination-name }})
    needs: build
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            destination-name: Mac
            test-destination: 'platform=macOS'
          - platform: iOS
            destination-name: iPhone 17 Pro
            test-destination: 'platform=iOS Simulator,name=iPhone 17 Pro'
          - platform: iOS
            destination-name: iPhone 17 Pro Max
            test-destination: 'platform=iOS Simulator,name=iPhone 17 Pro Max'
          - platform: iOS
            destination-name: iPhone 17
            test-destination: 'platform=iOS Simulator,name=iPhone 17'
          - platform: iOS
            destination-name: iPhone Air
            test-destination: 'platform=iOS Simulator,name=iPhone Air'
          - platform: iOS
            destination-name: iPad Pro 13-inch (M5)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
          - platform: iOS
            destination-name: iPad Air 11-inch (M3)
            test-destination: 'platform=iOS Simulator,name=iPad Air 11-inch (M3)'
          - platform: iOS
            destination-name: iPad (A16)
            test-destination: 'platform=iOS Simulator,name=iPad (A16)'
          - platform: iOS
            destination-name: iPad mini (A17 Pro)
            test-destination: 'platform=iOS Simulator,name=iPad mini (A17 Pro)'
    steps:
      - name: Download Test Products
        uses: actions/download-artifact@v7
        with:
          name: TestProducts-${{ matrix.platform }}
          path: ${{ runner.temp }}

      - name: Extract Test Products
        run: ditto -x -k '${{ runner.temp }}/Products.xctestproducts.zip' '${{ runner.temp }}'

      - name: Inspect Test Products
        if: matrix.platform == 'macOS'
        run: |
          echo "=== Executable permissions ==="
          find '${{ runner.temp }}/Products.xctestproducts' -path '*/Contents/MacOS/*' -type f | while read -r f; do
            ls -l "$f"
          done

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          # Download displaymode v1.4.0
          curl -fsSL https://github.com/p00ya/displaymode/releases/download/v1.4.0/displaymode -o /tmp/displaymode
          chmod +x /tmp/displaymode

          # List available display modes for diagnostics
          /tmp/displaymode d || true

          # Set resolution via displaymode (CoreGraphics API)
          if /tmp/displaymode t 1920 1080; then
            echo "Resolution set via displaymode"
          else
            echo "::warning::Failed to set resolution"
          fi

          sleep 2
          /tmp/displaymode d || true

      - name: Record log start time
        id: log-start
        run: echo "timestamp=$(date -u '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Test
        run: >
          xcodebuild test-without-building
          -testProductsPath '${{ runner.temp }}/Products.xctestproducts'
          -destination '${{ matrix.test-destination }}'
          -resultBundlePath '${{ runner.temp }}/TestResults.xcresult'

      - name: Collect system logs on failure
        if: failure()
        run: |
          echo "=== PatronArchiver mentions ==="
          log show --start '${{ steps.log-start.outputs.timestamp }}' \
            --predicate 'eventMessage CONTAINS "PatronArchiver"' \
            --style compact 2>&1 | tail -300

          echo ""
          echo "=== Runningboard ==="
          log show --start '${{ steps.log-start.outputs.timestamp }}' \
            --predicate 'subsystem == "com.apple.runningboard"' \
            --style compact 2>&1 | tail -300

          echo ""
          echo "=== AMFI / taskgated / syspolicyd ==="
          log show --start '${{ steps.log-start.outputs.timestamp }}' \
            --predicate 'process == "amfid" OR process == "taskgated" OR process == "syspolicyd" OR subsystem == "com.apple.amfi"' \
            --style compact 2>&1 | tail -300

          echo ""
          echo "=== launchd spawn errors ==="
          log show --start '${{ steps.log-start.outputs.timestamp }}' \
            --predicate 'process == "launchd" AND eventMessage CONTAINS "spawn"' \
            --style compact 2>&1 | tail -100

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: TestResults-${{ matrix.destination-name }}.xcresult
          path: ${{ runner.temp }}/TestResults.xcresult
