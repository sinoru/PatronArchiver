name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'platform=macOS'
            test-destinations: >-
              -destination 'platform=macOS'
          - platform: iPhone
            build-destination: 'platform=iOS Simulator,name=iPhone 17 Pro'
            test-destinations: >-
              -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
              -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max'
              -destination 'platform=iOS Simulator,name=iPhone 17'
              -destination 'platform=iOS Simulator,name=iPhone Air'
          - platform: iPad
            build-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
            test-destinations: >-
              -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
              -destination 'platform=iOS Simulator,name=iPad Air 11-inch (M3)'
              -destination 'platform=iOS Simulator,name=iPad (A16)'
              -destination 'platform=iOS Simulator,name=iPad mini (A17 Pro)'
    steps:
      - uses: actions/checkout@v5

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          system_profiler SPDisplaysDataType | grep Resolution
          if [ -f "/Library/Application Support/VMware Tools/vmware-resolutionSet" ]; then
            "/Library/Application Support/VMware Tools/vmware-resolutionSet" 1920 1200
          elif [ -f "/Library/Application Support/Veertu/Anka/addons/change_res" ]; then
            "/Library/Application Support/Veertu/Anka/addons/change_res" 1920x1200x32@30
          else
            echo "::warning::No known resolution tool found"
          fi
          sleep 2
          system_profiler SPDisplaysDataType | grep Resolution

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: >
          xcodebuild test-without-building
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          ${{ matrix.test-destinations }}
          -disable-concurrent-destination-testing
          -resultBundlePath '${{ runner.temp }}/TestResults.xcresult'
          CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: TestResults-${{ matrix.platform }}.xcresult
          path: ${{ runner.temp }}/TestResults.xcresult
