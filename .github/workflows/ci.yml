name: CI

on:
  push:
    branches: [main, develop, 'release/*', 'hotfix/*', 'support/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main, develop, 'release/*', 'hotfix/*', 'support/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'generic/platform=macOS'
          - platform: iOS
            build-destination: 'generic/platform=iOS Simulator'
    steps:
      - uses: actions/checkout@v5

      - name: Restore Xcode Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: xcode-cache-${{ runner.os }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            xcode-cache-${{ runner.os }}-${{ matrix.platform }}-

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          CODE_SIGNING_ALLOWED=NO

      # WORKAROUND: Xcode 26.4+ split swift-testing into multiple
      # components alongside Testing.framework — lib_TestingInterop.dylib
      # under Developer/usr/lib and _Testing_*.framework helpers under
      # Developer/Library/Frameworks. `xcodebuild build-for-testing`
      # only embeds Testing.framework itself in .app/Frameworks, so when
      # the test stage runs on a machine whose Xcode toolchain predates
      # the split, dyld can't resolve these helpers and the app aborts
      # before any test starts. Copy every lib_*.dylib and
      # _Testing_*.framework sibling alongside the embedded
      # Testing.framework so future splits are also covered.
      - name: 'Workaround: Bundle swift-testing helper components'
        run: |
          set -euo pipefail
          XCT_PRODUCTS='${{ runner.temp }}/PatronArchiver.xctestproducts'
          if [ '${{ matrix.platform }}' = 'macOS' ]; then
            plat='MacOSX.platform'
            cfg='Debug'
            app_fw='PatronArchiver.app/Contents/Frameworks'
            ui_fw='PatronArchiverUITests-Runner.app/Contents/Frameworks'
          else
            plat='iPhoneSimulator.platform'
            cfg='Debug-iphonesimulator'
            app_fw='PatronArchiver.app/Frameworks'
            ui_fw='PatronArchiverUITests-Runner.app/Frameworks'
          fi
          dev="$(xcode-select -p)/Platforms/$plat/Developer"
          dst_base="$XCT_PRODUCTS/Binaries/0/$cfg"

          shopt -s nullglob
          dylibs=("$dev/usr/lib"/lib_*.dylib)
          subframeworks=("$dev/Library/Frameworks"/_Testing_*.framework)

          if [ ${#dylibs[@]} -eq 0 ] && [ ${#subframeworks[@]} -eq 0 ]; then
            echo "::notice::No swift-testing helpers found under $dev"
            exit 0
          fi

          for dst in "$dst_base/$app_fw" "$dst_base/$ui_fw"; do
            [ -d "$dst" ] || continue
            for src in "${dylibs[@]}" "${subframeworks[@]}"; do
              cp -Rv "$src" "$dst/"
            done
          done

      - name: Archive Test Products
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          '${{ runner.temp }}/PatronArchiver.xctestproducts'
          '${{ runner.temp }}/PatronArchiver.xctestproducts.zip'

      - name: Upload Test Products
        uses: actions/upload-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}/PatronArchiver.xctestproducts.zip

  test:
    name: Test (${{ matrix.destination-name }})
    needs: build
    runs-on: ${{ matrix.runs-on || 'macos-latest' }}
    strategy:
      matrix:
        include:
          # macOS — native, no simulator
          - platform: macOS
            destination-name: macOS 26 - Mac
            test-destination: 'platform=macOS'
            runs-on: macos-26
          - platform: macOS
            destination-name: macOS 15 - Mac
            test-destination: 'platform=macOS'
            runs-on: macos-15
          # iOS — all run on macos-26 so build and test share the same
          # Xcode toolchain. The iOS 18.6 runtime is missing from this
          # image and is installed on-demand by the setup step.
          - platform: iOS
            destination-name: iOS 26 - iPhone 17 Pro Max
            device-name: iPhone 17 Pro Max
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPhone 17
            device-name: iPhone 17
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPhone Air
            device-name: iPhone Air
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad Pro 13-inch (M5)
            device-name: iPad Pro 13-inch (M5)
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad Air 11-inch (M3)
            device-name: iPad Air 11-inch (M3)
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad (A16)
            device-name: iPad (A16)
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 26 - iPad mini (A17 Pro)
            device-name: iPad mini (A17 Pro)
            os-version: '26.2'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPhone 16 Pro Max
            device-name: iPhone 16 Pro Max
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPhone 16
            device-name: iPhone 16
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPhone 16e
            device-name: iPhone 16e
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPad Pro 13-inch (M4)
            device-name: iPad Pro 13-inch (M4)
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPad Air 11-inch (M2)
            device-name: iPad Air 11-inch (M2)
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPad (10th generation)
            device-name: iPad (10th generation)
            os-version: '18.6'
            runs-on: macos-26
          - platform: iOS
            destination-name: iOS 18 - iPad mini (A17 Pro)
            device-name: iPad mini (A17 Pro)
            os-version: '18.6'
            runs-on: macos-26
    steps:
      - name: Download Test Products
        uses: actions/download-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}

      - name: Extract Test Products
        run: ditto -x -k '${{ runner.temp }}/PatronArchiver.xctestproducts.zip' '${{ runner.temp }}'

      # Provision a fresh, deterministic simulator for this matrix entry:
      # install the runtime on-demand (no-op when already shipped in the
      # runner image), wipe pre-existing devices, then create only the
      # device this entry tests.
      - name: Setup iOS simulator
        if: matrix.platform == 'iOS'
        id: setup-sim
        env:
          DEVICE_NAME: ${{ matrix.device-name }}
          OS_VERSION: ${{ matrix.os-version }}
        run: |
          set -euo pipefail

          if ! xcrun simctl list runtimes 2>/dev/null | grep -q "iOS ${OS_VERSION} "; then
            echo "Downloading iOS ${OS_VERSION} simulator runtime…"
            sudo xcodebuild -downloadPlatform iOS -buildVersion "${OS_VERSION}"
          fi

          runtime_id="com.apple.CoreSimulator.SimRuntime.iOS-${OS_VERSION//./-}"

          xcrun simctl delete all

          device_type=$(xcrun simctl list devicetypes -j \
            | jq -r --arg name "$DEVICE_NAME" \
              '.devicetypes[] | select(.name == $name) | .identifier')
          if [ -z "$device_type" ]; then
            echo "::error::Device type '$DEVICE_NAME' not found"
            exit 1
          fi
          device_id=$(xcrun simctl create "$DEVICE_NAME" "$device_type" "$runtime_id")
          echo "Created '$DEVICE_NAME' ($device_id) on iOS ${OS_VERSION}"

          # Boot up front so xcodebuild doesn't hit its own boot timeout
          # on a fresh runtime/device (notably iOS 18 freshly downloaded).
          xcrun simctl boot "$device_id"
          xcrun simctl bootstatus "$device_id" -b
          echo "Simulator booted"

          # Expose for the Test step so the destination targets the exact
          # device we created — runtime downloads can spawn default
          # devices of the same name in the background, making name+OS
          # ambiguous.
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          # Download displaymode v1.4.0
          curl -fsSL https://github.com/p00ya/displaymode/releases/download/v1.4.0/displaymode -o /tmp/displaymode
          chmod +x /tmp/displaymode

          # List available display modes for diagnostics
          /tmp/displaymode d || true

          # Set resolution via displaymode (CoreGraphics API)
          if /tmp/displaymode t 1920 1080; then
            echo "Resolution set via displaymode"
          else
            echo "::warning::Failed to set resolution"
          fi

          sleep 2
          /tmp/displaymode d || true

      # WORKAROUND: Standalone SPM test bundles (e.g. PatronArchiverKitTests) resolve
      # @rpath frameworks via DYLD_FRAMEWORK_PATH → __SHAREDFRAMEWORKS__, which
      # points to the *local* Xcode's SharedFrameworks. When the build Xcode (26)
      # is newer than the test-runner Xcode (16.x/15.x), frameworks like
      # Testing.framework have ABI differences and dlopen fails with missing symbols.
      # Apple's xctestproducts embeds these frameworks inside the .app bundle but
      # does not make them available to standalone SPM test bundles.
      # Copying all build-time frameworks into __TESTROOT__/Debug/ ensures
      # DYLD_FRAMEWORK_PATH finds compatible copies first.
      # Remove this step once Apple fixes xctestproducts to properly provide
      # frameworks for standalone test bundles across Xcode versions.
      - name: 'Workaround: Provide build-time frameworks for standalone test bundles'
        run: |
          if [ '${{ matrix.platform }}' = 'macOS' ]; then
            src='${{ runner.temp }}/PatronArchiver.xctestproducts/Binaries/0/Debug/PatronArchiver.app/Contents/Frameworks'
            dst='${{ runner.temp }}/PatronArchiver.xctestproducts/Binaries/0/Debug'
          else
            src='${{ runner.temp }}/PatronArchiver.xctestproducts/Binaries/0/Debug-iphonesimulator/PatronArchiver.app/Frameworks'
            dst='${{ runner.temp }}/PatronArchiver.xctestproducts/Binaries/0/Debug-iphonesimulator'
          fi
          cp -R "$src/"* "$dst/"

      - name: Test
        env:
          TEST_DESTINATION: ${{ matrix.test-destination || format('platform=iOS Simulator,id={0}', steps.setup-sim.outputs.device_id) }}
        run: >
          xcodebuild test-without-building
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          -destination "$TEST_DESTINATION"
          -resultBundlePath '${{ runner.temp }}/PatronArchiver.xcresult'

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: PatronArchiver-${{ matrix.destination-name }}.xcresult
          path: ${{ runner.temp }}/PatronArchiver.xcresult
