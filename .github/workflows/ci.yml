name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - platform: macOS
            build-destination: 'generic/platform=macOS'
          - platform: iOS
            build-destination: 'generic/platform=iOS Simulator'
    steps:
      - uses: actions/checkout@v5

      - name: Analyze & Build for Testing
        run: >
          xcodebuild analyze build-for-testing
          -project PatronArchiver.xcodeproj
          -scheme PatronArchiver
          -destination '${{ matrix.build-destination }}'
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          CODE_SIGNING_ALLOWED=NO

      - name: Archive Test Products
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          '${{ runner.temp }}/PatronArchiver.xctestproducts'
          '${{ runner.temp }}/PatronArchiver.xctestproducts.zip'

      - name: Upload Test Products
        uses: actions/upload-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}/PatronArchiver.xctestproducts.zip

  test:
    name: Test (${{ matrix.destination-name }})
    needs: build
    runs-on: ${{ matrix.runs-on || 'macos-latest' }}
    strategy:
      matrix:
        include:
          # macOS 26
          - platform: macOS
            destination-name: Mac
            test-destination: 'platform=macOS'
            runs-on: macos-26
          # iOS 26
          - platform: iOS
            destination-name: iPhone 17 Pro
            test-destination: 'platform=iOS Simulator,name=iPhone 17 Pro'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPhone 17 Pro Max
            test-destination: 'platform=iOS Simulator,name=iPhone 17 Pro Max'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPhone 17
            test-destination: 'platform=iOS Simulator,name=iPhone 17'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPhone Air
            test-destination: 'platform=iOS Simulator,name=iPhone Air'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPad Pro 13-inch (M5)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPad Air 11-inch (M3)
            test-destination: 'platform=iOS Simulator,name=iPad Air 11-inch (M3)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPad (A16)
            test-destination: 'platform=iOS Simulator,name=iPad (A16)'
            runs-on: macos-26
          - platform: iOS
            destination-name: iPad mini (A17 Pro)
            test-destination: 'platform=iOS Simulator,name=iPad mini (A17 Pro)'
            runs-on: macos-26
          # macOS 15
          - platform: macOS
            destination-name: Mac (macOS 15)
            test-destination: 'platform=macOS'
            runs-on: macos-15
          # iOS 18
          - platform: iOS
            destination-name: iPhone 16 Pro (iOS 18)
            test-destination: 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iPhone 16 (iOS 18)
            test-destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iPad Pro 13-inch M4 (iOS 18)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=18.5'
            runs-on: macos-15
          - platform: iOS
            destination-name: iPad Air 13-inch M2 (iOS 18)
            test-destination: 'platform=iOS Simulator,name=iPad Air 13-inch (M2),OS=18.5'
            runs-on: macos-15
          # macOS 14
          - platform: macOS
            destination-name: Mac (macOS 14)
            test-destination: 'platform=macOS'
            runs-on: macos-14
          # iOS 17
          - platform: iOS
            destination-name: iPhone 15 Pro (iOS 17)
            test-destination: 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iPhone 15 (iOS 17)
            test-destination: 'platform=iOS Simulator,name=iPhone 15,OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iPad Pro 13-inch M4 (iOS 17)
            test-destination: 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=17.5'
            runs-on: macos-14
          - platform: iOS
            destination-name: iPad Air 13-inch M2 (iOS 17)
            test-destination: 'platform=iOS Simulator,name=iPad Air 13-inch (M2),OS=17.5'
            runs-on: macos-14
    steps:
      - name: Download Test Products
        uses: actions/download-artifact@v7
        with:
          name: PatronArchiver-${{ matrix.platform }}.xctestproducts
          path: ${{ runner.temp }}

      - name: Extract Test Products
        run: ditto -x -k '${{ runner.temp }}/PatronArchiver.xctestproducts.zip' '${{ runner.temp }}'

      - name: Set screen resolution
        if: matrix.platform == 'macOS'
        run: |
          # Download displaymode v1.4.0
          curl -fsSL https://github.com/p00ya/displaymode/releases/download/v1.4.0/displaymode -o /tmp/displaymode
          chmod +x /tmp/displaymode

          # List available display modes for diagnostics
          /tmp/displaymode d || true

          # Set resolution via displaymode (CoreGraphics API)
          if /tmp/displaymode t 1920 1080; then
            echo "Resolution set via displaymode"
          else
            echo "::warning::Failed to set resolution"
          fi

          sleep 2
          /tmp/displaymode d || true

      - name: Test
        run: >
          xcodebuild test-without-building
          -testProductsPath '${{ runner.temp }}/PatronArchiver.xctestproducts'
          -destination '${{ matrix.test-destination }}'
          -resultBundlePath '${{ runner.temp }}/PatronArchiver.xcresult'

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: PatronArchiver-${{ matrix.destination-name }}.xcresult
          path: ${{ runner.temp }}/PatronArchiver.xcresult
